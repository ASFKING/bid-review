# 所有 Agent 共享的全局配置

# 系统信息
system:
  name: "标书智能审核系统"
  version: "2.1"
  description: "基于大模型的标书多维度智能审核平台"

# 全局审核规范 - 所有 Agent 必须遵守
global_rules:
  - "只报告有明确证据的问题，禁止猜测"
  - "每个 issue 必须引用原文证据"
  - "confidence < 0.7 的问题标记为 needs_verification"
  - "禁止重复报告同一问题"
  - "严重程度必须基于实际影响判断，不夸大不缩小"

# 模型配置
models:
  reasoning:
    name: "qwen3.6-plus"
    description: "高质量推理，用于复杂判断"
  fast:
    name: "qwen-turbo"
    description: "快速处理，用于信息压缩"

# 审核维度
dimensions:
  completeness:
    name: "完整性"
    enabled: true
    priority: "高"
  compliance:
    name: "合规性"
    enabled: true
    priority: "高"
  price:
    name: "报价"
    enabled: true
    priority: "中"
  risk:
    name: "风险"
    enabled: true
    priority: "中"

# 评分配置
scoring:
  base_score: 100
  severity_deduction:
    高: 15
    中: 5
    低: 1

# LLM 容错配置——控制调用大模型时的重试、超时、修复策略
# 类比：潜水器的应急系统——氧气不够了自动切换备用瓶
llm_resilience:
  max_retries: 2                    # 最多重试 2 次（加上首次调用，总共最多 3 次）
  retry_delays: [2, 4]              # 每次重试前等待的秒数（指数退避）
  timeout_seconds: 60               # 单次调用超时秒数
  rate_limit_max_wait: 30           # 遇到 429 限流时，最多等待 30 秒
  json_repair: true                 # 启用 JSON 自动修复